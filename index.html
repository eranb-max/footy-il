<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080808">
<title>Footy | Foot Locker IL</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080808;--s1:#111113;--s2:#1a1a1e;--s3:#222228;--bd:#2a2a32;
  --red:#e30613;--rdk:#b8040f;--rglow:rgba(227,6,19,0.2);
  --wh:#fff;--g1:#f0f0f0;--g2:#aaa;--g3:#555560;--grn:#22c55e;
  --ff:'Heebo',sans-serif;--fd:'Bebas Neue',cursive;
}
html{height:100%;height:-webkit-fill-available;background:var(--bg);overflow:hidden}
body{height:100%;height:100dvh;font-family:var(--ff);color:var(--wh);background:var(--bg);overflow:hidden;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100dvh;max-width:500px;margin:0 auto;background:var(--s1);position:relative;overflow:hidden}
#app::before{content:'';position:fixed;top:-15%;right:-10%;width:55vw;height:55vw;max-width:320px;max-height:320px;background:radial-gradient(circle,var(--rglow) 0%,transparent 70%);pointer-events:none;z-index:0}
header{flex-shrink:0;padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;background:rgba(8,8,8,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);position:relative;z-index:10}
.hi{display:flex;align-items:center;gap:12px}
.logo{width:46px;height:46px;border-radius:14px;overflow:hidden;border:1.5px solid var(--bd);flex-shrink:0}
.logo img{width:100%;height:100%;object-fit:cover;display:block}
.ht{flex:1;min-width:0}
.hn{font-family:var(--fd);font-size:28px;letter-spacing:3px;line-height:1;color:var(--wh)}
.hn em{color:var(--red);font-style:normal}
.hs{font-size:10px;color:var(--g3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spill{display:flex;align-items:center;gap:5px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);border-radius:20px;padding:4px 10px;flex-shrink:0}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--grn);box-shadow:0 0 6px var(--grn);animation:bl 2.5s ease-in-out infinite}
.stxt{font-size:10px;color:var(--grn);font-weight:600;letter-spacing:.5px}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.cw{flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--bd);z-index:9}
.cs{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cs::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;display:flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--bd);color:var(--g2);font-family:var(--ff);font-size:12px;font-weight:500;padding:6px 13px;border-radius:20px;cursor:pointer;transition:all .18s;white-space:nowrap;user-select:none;-webkit-user-select:none}
.chip:active{background:var(--red);border-color:var(--red);color:var(--wh);transform:scale(.95)}
#msgs{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 14px;display:flex;flex-direction:column;gap:14px;position:relative;z-index:1;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.wc{background:linear-gradient(145deg,rgba(227,6,19,.08),var(--s2));border:1px solid var(--bd);border-right:3px solid var(--red);border-radius:18px;padding:18px;animation:fu .4s ease}
.wct{font-family:var(--fd);font-size:26px;letter-spacing:2px;color:var(--wh);margin-bottom:6px;line-height:1.1}
.wct span{color:var(--red)}
.wcd{font-size:13px;color:var(--g2);line-height:1.7;margin-bottom:14px}
.wcg{display:flex;flex-wrap:wrap;gap:6px}
.wctag{background:var(--s3);border:1px solid var(--bd);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--g2)}
.msg{display:flex;gap:9px;animation:fu .22s ease;max-width:88%}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.u{flex-direction:row-reverse;align-self:flex-start;max-width:82%}
.msg.b{align-self:flex-end}
.av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;margin-top:2px}
.msg.b .av{background:var(--red);box-shadow:0 2px 10px var(--rglow)}
.msg.u .av{background:var(--s3);border:1px solid var(--bd)}
.mc{display:flex;flex-direction:column;gap:3px;min-width:0}
.mb{padding:11px 15px;border-radius:18px;font-size:14px;line-height:1.65;word-break:break-word}
.msg.b .mb{background:var(--s2);border:1px solid var(--bd);border-bottom-right-radius:5px;color:var(--g1)}
.msg.u .mb{background:var(--red);border-bottom-left-radius:5px;color:var(--wh);box-shadow:0 2px 12px var(--rglow)}
.mb strong{color:var(--wh);font-weight:700}
.mb code{background:rgba(0,0,0,.4);padding:1px 6px;border-radius:5px;font-size:12px;color:var(--red)}
.mt{font-size:10px;color:var(--g3);padding:0 4px}
.msg.u .mt{text-align:left}
.tbw{display:flex;gap:9px;align-items:flex-end;animation:fu .2s ease}
.tbb{background:var(--s2);border:1px solid var(--bd);border-radius:18px;border-bottom-right-radius:5px;padding:14px 18px;display:flex;align-items:center;gap:5px}
.tbd{width:7px;height:7px;background:var(--red);border-radius:50%;animation:tb 1.3s ease-in-out infinite;opacity:.7}
.tbd:nth-child(2){animation-delay:.18s}
.tbd:nth-child(3){animation-delay:.36s}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-7px);opacity:1}}
.dd{display:flex;align-items:center;gap:10px;color:var(--g3);font-size:11px;padding:4px 0}
.dd::before,.dd::after{content:'';flex:1;height:1px;background:var(--bd)}
#ia{flex-shrink:0;background:rgba(8,8,8,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));position:relative;z-index:10}
.ir{display:flex;align-items:flex-end;gap:10px;background:var(--s2);border:1.5px solid var(--bd);border-radius:26px;padding:6px 6px 6px 16px;transition:border-color .2s}
.ir:focus-within{border-color:var(--red);box-shadow:0 0 0 3px var(--rglow)}
#inp{flex:1;background:transparent;border:none;outline:none;font-family:var(--ff);font-size:15px;color:var(--wh);resize:none;max-height:120px;min-height:32px;line-height:1.5;direction:rtl;scrollbar-width:none;padding:4px 0}
#inp::-webkit-scrollbar{display:none}
#inp::placeholder{color:var(--g3)}
#sb{width:42px;height:42px;border-radius:50%;background:var(--red);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;box-shadow:0 2px 10px var(--rglow)}
#sb:active{transform:scale(.9);background:var(--rdk)}
#sb:disabled{background:var(--s3);box-shadow:none;cursor:not-allowed}
#sb svg{width:18px;height:18px;fill:white}
.hint{text-align:center;font-size:10px;color:var(--g3);margin-top:6px}
@media(min-width:500px){#app{border-left:1px solid var(--bd);border-right:1px solid var(--bd);box-shadow:0 0 60px rgba(0,0,0,.8)}}
</style>
</head>

      <span class="wctag">📊 שרביט קסמים</span>

      <span class="wctag">👟 מוצרי ניקוי</span>
      <span class="wctag">🇦🇪 ערבית</span>
    </div>
  </div>`);
  const d=new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});
  addRaw('<div class="dd">'+d+'</div>');
}
function addUser(t) {
  addRaw(`<div class="msg u">
    <div class="av">👤</div>
    <div class="mc">
      <div class="mb">` + t.replace(/</g,'&lt;').replace(/>/g,'&gt;') + `</div>
      <div class="mt">` + ts() + `</div>
    </div>
  </div>`);
}
function showTyping() {
  const d=document.createElement('div');
  d.id='typ';d.className='tbw';
  d.innerHTML='<div class="av" style="background:var(--red);box-shadow:0 2px 10px var(--rglow)">👟</div><div class="tbb"><div class="tbd"></div><div class="tbd"></div><div class="tbd"></div></div>';
  document.getElementById('msgs').appendChild(d);scroll();
}
function hideTyping(){const t=document.getElementById('typ');if(t)t.remove();}
function addBot(t) {
  addRaw(`<div class="msg b">
    <div class="av" style="background:var(--red);box-shadow:0 2px 10px var(--rglow)">👟</div>
    <div class="mc">
      <div class="mb">` + fmt(t) + `</div>
      <div class="mt">` + ts() + `</div>
    </div>
  </div>`);
}
async function send() {
  if(loading)return;
  const inp=document.getElementById('inp');
  const t=inp.value.trim();
  if(!t)return;
  inp.value='';inp.style.height='auto';
  loading=true;document.getElementById('sb').disabled=true;
  addUser(t);history.push({role:'user',content:t});showTyping();
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),15000);
    const r=await fetch('/api/chat',{signal:ctrl.signal,
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:SP,messages:history})
    });
    clearTimeout(timer);
    const d=await r.json();
    hideTyping();
    if(d.error){addBot('שגיאה: '+(d.error.message||'נסה שוב'));history.pop();}
    else{const rep=d.content[0].text;addBot(rep);history.push({role:'assistant',content:rep});}
  }catch(e){clearTimeout(timer);hideTyping();addBot(e.name==='AbortError'?'הבקשה לקחה יותר מדי זמן. נסה שוב.':'בעיית חיבור. בדוק אינטרנט ונסה שוב.');history.pop();}
  loading=false;document.getElementById('sb').disabled=false;inp.focus();
}
// Mobile keyboard fix
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',()=>{
    document.getElementById('app').style.height=window.visualViewport.height+'px';
    scroll();
  });
}
welcome();
</script>
</body>
</html>
